version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - unused
    - errorlint
    - gocritic
    - gocyclo
    - misspell
    - unparam
    - gosec
    - revive
  settings:
    gocyclo:
      min-complexity: 30
    gosec:
      excludes:
        # G104 (errcheck duplicate), G304 (file path from variable — we own
        # the inputs), G404 (math/rand acceptable for jitter / non-crypto).
        - G104
        - G304
        - G404
    errorlint:
      errorf: true
      asserts: true
    revive:
      rules:
        - name: var-declaration
        - name: package-comments
          disabled: true
        - name: exported
          disabled: true
        - name: indent-error-flow
        - name: superfluous-else
        - name: unreachable-code
        - name: redefines-builtin-id
  exclusions:
    rules:
      # Test helpers commonly skip return checks and grow long happily.
      - path: _test\.go
        linters:
          - gosec
          - gocyclo
          - errcheck
          - unparam
          - revive
      # Process-entry orchestration is intentionally a long sequence.
      - path: cmd/alertmesh/main\.go
        linters:
          - gocyclo
      # Generated by google/wire — out of our control.
      - path: cmd/alertmesh/wire_gen\.go
        linters:
          - gocyclo
          - revive
          - gocritic
      # Vendored / mirrored third-party (kept under web/node_modules for
      # the JS toolchain) — never lint these.
      - path: web/node_modules/
        linters:
          - errcheck
          - govet
          - staticcheck
          - ineffassign
          - unused
          - errorlint
          - gocritic
          - gocyclo
          - misspell
          - unparam
          - gosec
          - revive

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
